name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Format, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nba-tracker-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Format check with black
        run: black --check app/

      - name: Run tests
        run: pytest app/tests/ -v --tb=short
        env:
          GROQ_API_KEY: ""
          NBA_API_PROXY: ""

  frontend:
    name: Frontend — Type Check, Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nba-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nba-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings 0
